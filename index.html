<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reposiciones - La Mediterrania</title>

    <!-- Meta tags para PWA (Añadir a Pantalla de Inicio) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Reposiciones">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Librerías Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Fuentes para mantener la estética -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #f8fafc; /* slate-50 */
            color: #1e293b; /* slate-800 */
        }
        .font-logo {
            font-family: 'Cormorant Garamond', serif;
            letter-spacing: 0.02em;
        }
        .hidden-view { display: none !important; }
        
        /* Animaciones para App Nativa */
        .animate-enter { animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-leave { animation: fadeOut 0.2s ease-in forwards; }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeOut {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(0.95); }
        }
    </style>
</head>
<body class="min-h-screen selection:bg-indigo-100 bg-slate-50">

    <!-- Cabecera Elegante -->
    <header class="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-20 border-b border-slate-200/60">
        <div class="max-w-3xl mx-auto px-4 py-4 sm:px-6 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-xl shadow-inner shadow-indigo-800/20 text-white">
                    <i data-lucide="clipboard-list" class="w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-slate-900 leading-none">Reposiciones</h1>
                    <span class="text-sm font-logo tracking-widest text-indigo-600 font-semibold lowercase">La Mediterrània</span>
                </div>
            </div>
            <!-- Botón de info opcional o logo pequeño -->
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 sm:px-6 py-6 pb-24">
        
        <!-- Estado de Carga -->
        <div id="loading" class="flex flex-col items-center justify-center py-20 gap-3">
            <i data-lucide="loader-2" class="w-10 h-10 text-indigo-600 animate-spin"></i>
            <span class="text-slate-500 font-medium animate-pulse">Sincronizando...</span>
        </div>

        <div id="app-content" class="hidden-view">
            
            <!-- Formulario de Entrada -->
            <div id="form-container" class="bg-white rounded-[2rem] shadow-sm shadow-slate-200/50 border border-slate-200/60 p-5 sm:p-6 mb-8 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-500 via-purple-500 to-indigo-500 opacity-20"></div>
                <form id="add-form">
                    <div class="mb-5">
                        <label for="item-input" class="block text-sm font-bold text-slate-700 mb-2 flex items-center gap-2">
                            <i data-lucide="pen-line" class="w-4 h-4 text-slate-400"></i> ¿Qué hace falta en el local?
                        </label>
                        <input
                            type="text"
                            id="item-input"
                            required
                            placeholder='Ej: "Se ha agotado el Seagrams"'
                            class="w-full text-lg p-4 bg-slate-50/50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all outline-none shadow-inner font-medium placeholder-slate-400"
                            autocomplete="off"
                        >
                    </div>

                    <div class="flex flex-col sm:flex-row gap-4 justify-between items-start sm:items-center">
                        <div class="flex gap-2 w-full sm:w-auto p-1 bg-slate-100/80 rounded-xl" id="urgency-buttons">
                            <button type="button" onclick="setUrgency('alta')" id="urg-alta" class="flex-1 sm:flex-none flex items-center justify-center gap-1.5 px-4 py-2.5 rounded-lg text-sm font-bold transition-all bg-white shadow-sm text-red-600 border border-slate-200 relative overflow-hidden">
                                <span class="absolute inset-0 bg-red-50 opacity-0 transition-opacity"></span>
                                <i data-lucide="alert-triangle" class="w-4 h-4 z-10"></i> <span class="z-10">Agotado</span>
                            </button>
                            <button type="button" onclick="setUrgency('media')" id="urg-media" class="flex-1 sm:flex-none flex items-center justify-center gap-1.5 px-4 py-2.5 rounded-lg text-sm font-bold transition-all text-slate-500 hover:text-slate-700">
                                <i data-lucide="clock" class="w-4 h-4"></i> Queda poco
                            </button>
                        </div>

                        <button type="submit" class="w-full sm:w-auto flex items-center justify-center gap-2 bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-md shadow-indigo-600/20 active:scale-[0.98]">
                            <i data-lucide="plus" class="w-5 h-5"></i>
                            Añadir Aviso
                        </button>
                    </div>
                </form>
            </div>

            <!-- Cabecera de la Lista -->
            <div class="flex items-center justify-between mb-4 px-2">
                <h2 class="text-sm font-bold text-slate-500 uppercase tracking-wider">Lista de Pendientes</h2>
                <span id="counter-badge" class="bg-indigo-100 text-indigo-700 text-xs font-bold px-2 py-1 rounded-full">0</span>
            </div>

            <!-- Lista de Reposiciones -->
            <div id="items-list" class="space-y-3">
                <!-- Los items se inyectan aquí con JS -->
            </div>
            
            <!-- Mensaje de lista vacía -->
            <div id="empty-state" class="hidden-view flex flex-col items-center justify-center py-16 px-4 bg-white/50 rounded-[2rem] border-2 border-slate-200 border-dashed">
                <div class="bg-slate-100 p-4 rounded-full mb-4">
                    <i data-lucide="check-check" class="h-8 w-8 text-slate-400"></i>
                </div>
                <h3 class="text-lg font-bold text-slate-800">Todo al día</h3>
                <p class="text-slate-500 text-center mt-1 text-sm max-w-[250px]">No hay reposiciones pendientes. ¡El local está a tope!</p>
            </div>
        </div>
    </main>

    <!-- Modal de Confirmación de Reposición -->
    <div id="modal-confirm" class="hidden fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl p-6 sm:p-8 max-w-sm w-full relative overflow-hidden animate-enter">
            <div class="absolute top-0 left-0 right-0 h-1 bg-emerald-500"></div>
            
            <div class="text-center mb-6">
                <div class="bg-emerald-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-emerald-600">
                    <i data-lucide="check-circle-2" class="w-8 h-8"></i>
                </div>
                <h3 class="text-xl font-bold text-slate-900">¿Producto repuesto?</h3>
                <p class="text-sm text-slate-500 mt-2 leading-relaxed" id="modal-item-text">...</p>
            </div>
            
            <div class="flex flex-col gap-3">
                <button type="button" id="btn-confirm-delete" class="w-full py-3.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl font-bold transition-all text-sm shadow-md flex justify-center items-center gap-2">
                    Sí, eliminar de la lista
                </button>
                <button type="button" onclick="cerrarModal()" class="w-full py-3.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-bold transition-all text-sm">
                    Cancelar
                </button>
            </div>
        </div>
    </div>

    <!-- FIREBASE Y LÓGICA -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // TUS CLAVES DE FIREBASE DE LA APP DE FICHAJES
        const firebaseConfig = {
            apiKey: "AIzaSyB9PbJS02DWqrbQYLSC50cNhTWsUL9TwP4",
            authDomain: "fichajes-9e04f.firebaseapp.com",
            projectId: "fichajes-9e04f",
            storageBucket: "fichajes-9e04f.firebasestorage.app",
            messagingSenderId: "628635461198",
            appId: "1:628635461198:web:6440bdae98afaa796d851f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Variables de Estado
        let currentUrgency = 'alta';
        let allItems = [];
        let itemToDeleteId = null;

        // UI: Urgencia
        window.setUrgency = function(level) {
            currentUrgency = level;
            const btnAlta = document.getElementById('urg-alta');
            const btnMedia = document.getElementById('urg-media');

            // Resetear
            btnAlta.className = "flex-1 sm:flex-none flex items-center justify-center gap-1.5 px-4 py-2.5 rounded-lg text-sm font-bold transition-all text-slate-500 hover:text-slate-700";
            btnMedia.className = "flex-1 sm:flex-none flex items-center justify-center gap-1.5 px-4 py-2.5 rounded-lg text-sm font-bold transition-all text-slate-500 hover:text-slate-700";
            
            // Quitar spans hijos extras para limpiar
            btnAlta.innerHTML = `<i data-lucide="alert-triangle" class="w-4 h-4"></i> Agotado`;
            btnMedia.innerHTML = `<i data-lucide="clock" class="w-4 h-4"></i> Queda poco`;

            // Activar seleccionado
            if (level === 'alta') {
                btnAlta.className = "flex-1 sm:flex-none flex items-center justify-center gap-1.5 px-4 py-2.5 rounded-lg text-sm font-bold transition-all bg-white shadow-sm text-red-600 border border-slate-200 relative overflow-hidden";
                btnAlta.innerHTML = `<span class="absolute inset-0 bg-red-50 opacity-100 transition-opacity"></span><i data-lucide="alert-triangle" class="w-4 h-4 z-10"></i> <span class="z-10">Agotado</span>`;
            }
            if (level === 'media') {
                btnMedia.className = "flex-1 sm:flex-none flex items-center justify-center gap-1.5 px-4 py-2.5 rounded-lg text-sm font-bold transition-all bg-white shadow-sm text-amber-600 border border-slate-200 relative overflow-hidden";
                btnMedia.innerHTML = `<span class="absolute inset-0 bg-amber-50 opacity-100 transition-opacity"></span><i data-lucide="clock" class="w-4 h-4 z-10"></i> <span class="z-10">Queda poco</span>`;
            }
            lucide.createIcons();
        };

        // Renderizar Lista
        function renderItems() {
            const container = document.getElementById('items-list');
            const emptyState = document.getElementById('empty-state');
            const counter = document.getElementById('counter-badge');
            
            container.innerHTML = '';
            counter.textContent = allItems.length;

            if (allItems.length === 0) {
                container.classList.add('hidden-view');
                emptyState.classList.remove('hidden-view');
                return;
            }

            container.classList.remove('hidden-view');
            emptyState.classList.add('hidden-view');

            allItems.forEach(item => {
                const date = new Date(item.timestamp);
                const timeStr = date.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
                const isAlta = item.urgency === 'alta';
                
                let urgencyBadge = isAlta 
                    ? `<span class="inline-flex items-center gap-1 rounded-md bg-red-50 px-2 py-1 text-[10px] font-bold text-red-700 ring-1 ring-inset ring-red-600/20 uppercase tracking-wider"><i data-lucide="alert-triangle" class="w-3 h-3"></i> Agotado</span>`
                    : `<span class="inline-flex items-center gap-1 rounded-md bg-amber-50 px-2 py-1 text-[10px] font-bold text-amber-700 ring-1 ring-inset ring-amber-600/20 uppercase tracking-wider"><i data-lucide="clock" class="w-3 h-3"></i> Queda poco</span>`;

                const html = `
                    <div class="animate-enter bg-white p-4 sm:p-5 rounded-2xl shadow-sm border border-slate-200 flex flex-col sm:flex-row gap-4 items-start sm:items-center hover:border-indigo-300 hover:shadow-md transition-all group">
                        
                        <div class="flex-grow min-w-0 w-full">
                            <div class="flex items-center gap-2 mb-2">
                                ${urgencyBadge}
                                <span class="text-xs text-slate-400 font-medium flex items-center gap-1 ml-auto sm:ml-0"><i data-lucide="calendar-clock" class="w-3 h-3"></i> ${timeStr}</span>
                            </div>
                            <p class="text-lg font-bold text-slate-800 break-words leading-tight">
                                ${item.text}
                            </p>
                        </div>

                        <div class="flex items-center gap-2 w-full sm:w-auto pt-3 sm:pt-0 border-t border-slate-100 sm:border-0 mt-2 sm:mt-0">
                            <!-- Botón Avisar optimizado -->
                            <button onclick="shareItem('${item.text}', '${item.urgency}')" class="flex-1 sm:flex-none flex items-center justify-center gap-1.5 px-4 py-2.5 bg-indigo-50/50 hover:bg-indigo-100 text-indigo-700 rounded-xl text-sm font-bold transition-colors">
                                <i data-lucide="send" class="w-4 h-4"></i>
                                Avisar
                            </button>
                            
                            <!-- Botón Repuesto (Eliminar) -->
                            <button onclick="preguntarEliminar('${item.id}', \`${item.text.replace(/`/g, "'")}\`)" class="flex-1 sm:flex-none flex items-center justify-center gap-1.5 px-4 py-2.5 bg-slate-100 hover:bg-emerald-100 text-slate-600 hover:text-emerald-700 rounded-xl text-sm font-bold transition-colors">
                                <i data-lucide="check-circle" class="w-4 h-4"></i>
                                Repuesto
                            </button>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
            lucide.createIcons();
        }

        // --- FUNCIONES FIREBASE ---
        const reposicionesRef = collection(db, 'reposiciones_app');

        // Autenticación Anónima (Silenciosa)
        signInAnonymously(auth).catch((error) => console.error("Error Auth:", error));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Escuchar datos (ordenados en memoria como te recomendaba antes, o con query si tienes índices)
                onSnapshot(reposicionesRef, (snapshot) => {
                    allItems = [];
                    snapshot.forEach((doc) => {
                        allItems.push({ id: doc.id, ...doc.data() });
                    });
                    
                    // Ordenar: más recientes primero
                    allItems.sort((a, b) => b.timestamp - a.timestamp);
                    
                    document.getElementById('loading').classList.add('hidden-view');
                    document.getElementById('app-content').classList.remove('hidden-view');
                    renderItems();
                });
            }
        });

        // Añadir Item
        document.getElementById('add-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('item-input');
            const text = input.value.trim();
            if (!text) return;

            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Guardando...`;
            btn.disabled = true;

            try {
                await addDoc(reposicionesRef, {
                    text: text,
                    urgency: currentUrgency,
                    timestamp: Date.now()
                });
                input.value = '';
                setUrgency('alta');
                
                // Efecto visual sutil de éxito en el input
                input.classList.add('ring-2', 'ring-emerald-400', 'bg-emerald-50');
                setTimeout(() => input.classList.remove('ring-2', 'ring-emerald-400', 'bg-emerald-50'), 1000);
            } catch (error) {
                alert("Error al añadir. Revisa tu conexión.");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
                lucide.createIcons();
            }
        });

        // --- LÓGICA DE ELIMINAR (MODAL) ---
        window.preguntarEliminar = function(id, text) {
            itemToDeleteId = id;
            document.getElementById('modal-item-text').textContent = text;
            const modal = document.getElementById('modal-confirm');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        };

        window.cerrarModal = function() {
            const modal = document.getElementById('modal-confirm');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            itemToDeleteId = null;
        };

        document.getElementById('btn-confirm-delete').addEventListener('click', async () => {
            if (!itemToDeleteId) return;
            const btn = document.getElementById('btn-confirm-delete');
            const originalText = btn.innerHTML;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Borrando...`;
            
            try {
                await deleteDoc(doc(db, 'reposiciones_app', itemToDeleteId));
                cerrarModal();
            } catch (error) {
                console.error("Error al eliminar:", error);
                alert("Hubo un error al marcar como repuesto.");
            } finally {
                btn.innerHTML = originalText;
                lucide.createIcons();
            }
        });

        // --- LÓGICA DE COMPARTIR (AVISAR NATIVO) ---
        window.shareItem = async (text, urgency) => {
            let urgencyText = urgency === 'alta' ? '🚨 AGOTADO' : '⚠️ QUEDA POCO';
            // Mensaje formateado para WhatsApp
            const message = `*Aviso La Mediterrània*\n\n${urgencyText}:\n_${text}_`;

            // 1. Intentar Web Share API nativa (iPad/iPhone)
            if (navigator.share) {
                try {
                    await navigator.share({
                        text: message,
                    });
                    return; // Si funciona, salimos
                } catch (error) {
                    console.log('Error o usuario canceló share:', error);
                    // Si el usuario cancela, es un error tipo "AbortError", no hacemos fallback
                    if (error.name === 'AbortError') return; 
                }
            } 
            
            // 2. Fallback a WhatsApp Web/App si Web Share API falla o no está disponible
            // Usamos encodeURIComponent para asegurar que los espacios y emojis pasen bien en la URL
            const whatsappUrl = `https://wa.me/?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');
        };

        // Inicializar iconos al cargar
        lucide.createIcons();
    </script>
</body>
</html>
