<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reposiciones - La Mediterrania</title>

    <!-- Meta tags para PWA (Añadir a Pantalla de Inicio) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Reposiciones">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Librerías Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f8fafc; /* slate-50 */
            color: #1e293b; /* slate-800 */
        }
        .hidden-view { display: none !important; }
    </style>
</head>
<body class="min-h-screen pb-20 selection:bg-indigo-100">

    <!-- Cabecera -->
    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-4xl mx-auto px-4 py-5 sm:px-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-slate-900 flex items-center gap-2">
                    <i data-lucide="plus-circle" class="text-indigo-600 w-7 h-7"></i>
                    Reposiciones
                </h1>
                <p class="text-sm text-slate-500 mt-1">Apunta lo que falta en el local</p>
            </div>
            <div class="flex bg-slate-100 p-1 rounded-lg">
                <button id="btn-view-pendientes" onclick="switchView('pendientes')" class="px-4 py-2 rounded-md text-sm font-medium transition-colors bg-white shadow text-indigo-700">
                    Faltan
                </button>
                <button id="btn-view-completados" onclick="switchView('completados')" class="px-4 py-2 rounded-md text-sm font-medium transition-colors text-slate-600 hover:text-slate-900">
                    Comprados
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 py-8">
        
        <!-- Estado de Carga -->
        <div id="loading" class="flex justify-center py-12">
            <i data-lucide="loader-2" class="w-10 h-10 text-indigo-600 animate-spin"></i>
        </div>

        <div id="app-content" class="hidden-view">
            <!-- Formulario de entrada (Solo en pendientes) -->
            <div id="form-container" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 mb-8">
                <form id="add-form">
                    <div class="mb-4">
                        <label for="item" class="block text-sm font-medium text-slate-700 mb-2">
                            ¿Qué necesitamos?
                        </label>
                        <input
                            type="text"
                            id="item-input"
                            required
                            placeholder='Ej: "No queda nada de Seagrams"'
                            class="w-full text-lg p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none"
                            autocomplete="off"
                        >
                    </div>

                    <div class="flex flex-col sm:flex-row gap-4 justify-between items-start sm:items-center">
                        <div class="flex gap-2 w-full sm:w-auto" id="urgency-buttons">
                            <button type="button" onclick="setUrgency('alta')" id="urg-alta" class="flex-1 sm:flex-none flex items-center justify-center gap-1.5 px-3 py-2 rounded-lg text-sm font-medium transition-all bg-red-100 text-red-700 border-2 border-red-200">
                                <i data-lucide="alert-triangle" class="w-4 h-4"></i> Agotado
                            </button>
                            <button type="button" onclick="setUrgency('media')" id="urg-media" class="flex-1 sm:flex-none flex items-center justify-center gap-1.5 px-3 py-2 rounded-lg text-sm font-medium transition-all bg-slate-50 text-slate-600 border border-slate-200 hover:bg-slate-100">
                                <i data-lucide="clock" class="w-4 h-4"></i> Queda poco
                            </button>
                            <button type="button" onclick="setUrgency('baja')" id="urg-baja" class="flex-1 sm:flex-none flex items-center justify-center gap-1.5 px-3 py-2 rounded-lg text-sm font-medium transition-all bg-slate-50 text-slate-600 border border-slate-200 hover:bg-slate-100">
                                <i data-lucide="info" class="w-4 h-4"></i> Aviso
                            </button>
                        </div>

                        <button type="submit" class="w-full sm:w-auto flex items-center justify-center gap-2 bg-indigo-600 text-white px-6 py-3 rounded-xl font-medium hover:bg-indigo-700 transition-colors">
                            <i data-lucide="plus-circle" class="w-5 h-5"></i>
                            Añadir a la lista
                        </button>
                    </div>
                </form>
            </div>

            <!-- Lista de Reposiciones -->
            <div id="items-list" class="space-y-4">
                <!-- Los items se inyectan aquí con JS -->
            </div>
            
            <!-- Mensaje de lista vacía -->
            <div id="empty-state" class="hidden-view text-center py-16 bg-white rounded-2xl border border-slate-200 border-dashed">
                <i data-lucide="check-circle-2" class="mx-auto h-12 w-12 text-slate-300 mb-3 block"></i>
                <h3 class="text-lg font-medium text-slate-900">Todo al día</h3>
                <p class="text-slate-500" id="empty-text">No hay ninguna reposición pendiente.</p>
            </div>
        </div>
    </main>

    <!-- Tarjeta de información para la responsable -->
    <div class="fixed bottom-0 left-0 right-0 bg-indigo-50 border-t border-indigo-100 p-3 sm:p-4 text-center z-20">
        <p class="text-sm text-indigo-800 flex items-center justify-center gap-2">
            <i data-lucide="info" class="w-4 h-4"></i>
            Abre esta app en tu móvil para ver las actualizaciones en tiempo real.
        </p>
    </div>

    <!-- FIREBASE Y LÓGICA -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // TUS CLAVES DE FIREBASE (Tomadas de tu App de Fichajes)
        const firebaseConfig = {
            apiKey: "AIzaSyB9PbJS02DWqrbQYLSC50cNhTWsUL9TwP4",
            authDomain: "fichajes-9e04f.firebaseapp.com",
            projectId: "fichajes-9e04f",
            storageBucket: "fichajes-9e04f.firebasestorage.app",
            messagingSenderId: "628635461198",
            appId: "1:628635461198:web:6440bdae98afaa796d851f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Variables de Estado
        let currentView = 'pendientes'; // 'pendientes' o 'completados'
        let currentUrgency = 'alta';
        let allItems = [];

        // Funciones de UI
        window.switchView = function(view) {
            currentView = view;
            
            // Estilos botones cabecera
            const btnPendientes = document.getElementById('btn-view-pendientes');
            const btnCompletados = document.getElementById('btn-view-completados');
            
            if (view === 'pendientes') {
                btnPendientes.className = 'px-4 py-2 rounded-md text-sm font-medium transition-colors bg-white shadow text-indigo-700';
                btnCompletados.className = 'px-4 py-2 rounded-md text-sm font-medium transition-colors text-slate-600 hover:text-slate-900';
                document.getElementById('form-container').classList.remove('hidden-view');
            } else {
                btnCompletados.className = 'px-4 py-2 rounded-md text-sm font-medium transition-colors bg-white shadow text-emerald-700';
                btnPendientes.className = 'px-4 py-2 rounded-md text-sm font-medium transition-colors text-slate-600 hover:text-slate-900';
                document.getElementById('form-container').classList.add('hidden-view');
            }

            renderItems();
        };

        window.setUrgency = function(level) {
            currentUrgency = level;
            const btnAlta = document.getElementById('urg-alta');
            const btnMedia = document.getElementById('urg-media');
            const btnBaja = document.getElementById('urg-baja');

            // Resetear todos
            btnAlta.className = "flex-1 sm:flex-none flex items-center justify-center gap-1.5 px-3 py-2 rounded-lg text-sm font-medium transition-all bg-slate-50 text-slate-600 border border-slate-200 hover:bg-slate-100";
            btnMedia.className = "flex-1 sm:flex-none flex items-center justify-center gap-1.5 px-3 py-2 rounded-lg text-sm font-medium transition-all bg-slate-50 text-slate-600 border border-slate-200 hover:bg-slate-100";
            btnBaja.className = "flex-1 sm:flex-none flex items-center justify-center gap-1.5 px-3 py-2 rounded-lg text-sm font-medium transition-all bg-slate-50 text-slate-600 border border-slate-200 hover:bg-slate-100";

            // Activar seleccionado
            if (level === 'alta') btnAlta.className = "flex-1 sm:flex-none flex items-center justify-center gap-1.5 px-3 py-2 rounded-lg text-sm font-medium transition-all bg-red-100 text-red-700 border-2 border-red-200";
            if (level === 'media') btnMedia.className = "flex-1 sm:flex-none flex items-center justify-center gap-1.5 px-3 py-2 rounded-lg text-sm font-medium transition-all bg-amber-100 text-amber-700 border-2 border-amber-200";
            if (level === 'baja') btnBaja.className = "flex-1 sm:flex-none flex items-center justify-center gap-1.5 px-3 py-2 rounded-lg text-sm font-medium transition-all bg-blue-100 text-blue-700 border-2 border-blue-200";
        };

        // Renderizar Lista
        function renderItems() {
            const container = document.getElementById('items-list');
            const emptyState = document.getElementById('empty-state');
            const emptyText = document.getElementById('empty-text');
            
            container.innerHTML = '';
            
            const filteredItems = allItems.filter(item => currentView === 'pendientes' ? !item.completed : item.completed);

            if (filteredItems.length === 0) {
                container.classList.add('hidden-view');
                emptyState.classList.remove('hidden-view');
                emptyText.textContent = currentView === 'pendientes' ? 'No hay ninguna reposición pendiente.' : 'Aún no se ha marcado nada como repuesto.';
                return;
            }

            container.classList.remove('hidden-view');
            emptyState.classList.add('hidden-view');

            filteredItems.forEach(item => {
                const date = new Date(item.timestamp);
                const timeStr = date.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
                
                let urgencyBadge = '';
                if (item.urgency === 'alta') urgencyBadge = `<span class="inline-flex items-center gap-1 rounded-full bg-red-50 px-2 py-0.5 text-xs font-medium text-red-700 ring-1 ring-inset ring-red-600/20"><i data-lucide="alert-triangle" class="w-3 h-3"></i> Agotado</span>`;
                if (item.urgency === 'media') urgencyBadge = `<span class="inline-flex items-center gap-1 rounded-full bg-amber-50 px-2 py-0.5 text-xs font-medium text-amber-700 ring-1 ring-inset ring-amber-600/20"><i data-lucide="clock" class="w-3 h-3"></i> Queda poco</span>`;
                if (item.urgency === 'baja') urgencyBadge = `<span class="inline-flex items-center gap-1 rounded-full bg-blue-50 px-2 py-0.5 text-xs font-medium text-blue-700 ring-1 ring-inset ring-blue-600/20"><i data-lucide="info" class="w-3 h-3"></i> Aviso</span>`;

                const html = `
                    <div class="bg-white p-4 sm:p-5 rounded-2xl shadow-sm border flex flex-col sm:flex-row gap-4 items-start sm:items-center transition-all ${item.completed ? 'border-slate-200 opacity-70' : 'border-slate-200 hover:border-indigo-200 hover:shadow-md'}">
                        
                        <button onclick="toggleItem('${item.id}', ${item.completed})" class="flex-shrink-0 mt-1 sm:mt-0 focus:outline-none ${item.completed ? 'text-emerald-500' : 'text-slate-300 hover:text-indigo-600'} transition-colors">
                            <i data-lucide="${item.completed ? 'check-circle-2' : 'circle'}" class="w-8 h-8"></i>
                        </button>

                        <div class="flex-grow min-w-0 w-full">
                            <div class="flex items-center gap-2 mb-1">
                                ${urgencyBadge}
                                <span class="text-xs text-slate-400 ml-auto sm:ml-0">${timeStr}</span>
                            </div>
                            <p class="text-lg font-medium break-words ${item.completed ? 'text-slate-500 line-through' : 'text-slate-900'}">
                                ${item.text}
                            </p>
                        </div>

                        <div class="flex items-center gap-2 w-full sm:w-auto pt-3 sm:pt-0 border-t border-slate-100 sm:border-0 mt-2 sm:mt-0">
                            ${!item.completed ? `
                                <button onclick="shareItem('${item.text}', '${item.urgency}')" class="flex-1 sm:flex-none flex items-center justify-center gap-1.5 px-4 py-2 bg-slate-100 hover:bg-indigo-50 text-slate-700 hover:text-indigo-700 rounded-lg text-sm font-medium transition-colors">
                                    <i data-lucide="smartphone" class="w-4 h-4"></i>
                                    <span class="sm:hidden lg:inline">Avisar</span>
                                </button>
                            ` : ''}
                            <button onclick="deleteItem('${item.id}')" class="p-2 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors ml-auto sm:ml-0">
                                <i data-lucide="trash-2" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
            lucide.createIcons();
        }

        // --- FUNCIONES FIREBASE ---
        const reposicionesRef = collection(db, 'reposiciones');

        // Autenticación Anónima (Silenciosa)
        signInAnonymously(auth).catch((error) => console.error("Error Auth:", error));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Escuchar datos en tiempo real
                onSnapshot(reposicionesRef, (snapshot) => {
                    allItems = [];
                    snapshot.forEach((doc) => {
                        allItems.push({ id: doc.id, ...doc.data() });
                    });
                    
                    // Ordenar: más recientes primero
                    allItems.sort((a, b) => b.timestamp - a.timestamp);
                    
                    document.getElementById('loading').classList.add('hidden-view');
                    document.getElementById('app-content').classList.remove('hidden-view');
                    renderItems();
                });
            }
        });

        // Añadir Item
        document.getElementById('add-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('item-input');
            const text = input.value.trim();
            if (!text) return;

            try {
                await addDoc(reposicionesRef, {
                    text: text,
                    urgency: currentUrgency,
                    completed: false,
                    timestamp: Date.now()
                });
                input.value = '';
                setUrgency('alta'); // Volver a poner "Agotado" por defecto
            } catch (error) {
                alert("Error al añadir. Revisa tu conexión.");
            }
        });

        // Marcar/Desmarcar
        window.toggleItem = async (id, currentStatus) => {
            try {
                await updateDoc(doc(db, 'reposiciones', id), { completed: !currentStatus });
            } catch (error) {
                console.error("Error al actualizar:", error);
            }
        };

        // Eliminar
        window.deleteItem = async (id) => {
            if(confirm('¿Eliminar este aviso de reposición?')) {
                try {
                    await deleteDoc(doc(db, 'reposiciones', id));
                } catch (error) {
                    console.error("Error al eliminar:", error);
                }
            }
        };

        // Compartir / Avisar a Responsable
        window.shareItem = async (text, urgency) => {
            let urgencyText = urgency === 'alta' ? '🚨 AGOTADO' : urgency === 'media' ? '⚠️ QUEDA POCO' : 'ℹ️ AVISO';
            const message = `Hola! Aviso de reposición en el local:\n\n${urgencyText}: ${text}`;

            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Aviso de Reposición',
                        text: message,
                    });
                } catch (error) {
                    console.log('Error compartiendo:', error);
                }
            } else {
                // Fallback a WhatsApp
                window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
            }
        };

        // Inicializar iconos
        lucide.createIcons();
    </script>
</body>
</html>
